server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: все неизвестные пути отдаём index.html (роутинг на клиенте)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
